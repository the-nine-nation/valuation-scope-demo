name: Daily prices and deploy

on:
  schedule:
    # Trading-day style cadence (UTC): ~ every 30m during CN equity hours.
    # Shanghai 09:00–15:30 ≈ UTC 01:00–07:30.
    - cron: "0,30 1-7 * * 1-5"
    # Off-hours snapshot once more for close / evening readers
    - cron: "10 8 * * 1-5"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: daily-prices
  cancel-in-progress: true

jobs:
  update-prices:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update A-share prices
        run: npm run prices:update

      - name: Commit price snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.snapshot.json
          if git diff --cached --quiet; then
            echo "No price changes to commit."
          else
            git commit -m "chore: update A-share prices $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

  deploy:
    needs: update-prices
    if: >
      always() &&
      (needs.update-prices.result == 'success' || needs.update-prices.result == 'skipped') &&
      !(github.event_name == 'push' && (github.actor == 'github-actions[bot]' || github.actor == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed snapshot from source + prices
        run: npm run db:seed

      - name: Deploy public web app to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: apps/web
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set; skip deploy."
            exit 0
          fi
          npm run deploy
