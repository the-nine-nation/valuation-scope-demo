name: Daily prices and deploy

on:
  schedule:
    # 每个交易日北京时间 16:10（A 股收盘后）≈ UTC 08:10
    - cron: "10 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-prices
  cancel-in-progress: true

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update A-share prices
        run: npm run prices:update

      - name: Commit price snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stocks.source.json app/data/stocks.generated.json
          if git diff --cached --quiet; then
            echo "No price changes to commit."
          else
            git commit -m "chore: update A-share prices $(date -u +%Y-%m-%d)"
            git push
          fi

  deploy:
    needs: update-prices
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set; skip deploy."
            exit 0
          fi
          npm run deploy
